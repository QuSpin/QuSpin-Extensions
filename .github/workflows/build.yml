name: Build and Publish

on:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} for CPython ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-15]
        python: [cp311, cp312, cp313, cp314]

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Install boost (Linux/macOS)
        if: runner.os != 'Windows'
        uses: MarkusJx/install-boost@v2.4.5
        id: install-boost-unix
        with:
          boost_version: 1.86.0
          boost_install_dir: ${{ github.workspace }}/QuSpin-Extensions

      - name: Install boost (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $boostDir = "${{ github.workspace }}\QuSpin-Extensions\boost"
          New-Item -ItemType Directory -Force -Path $boostDir | Out-Null

          # Download the Boost tarball
          $url = "https://github.com/MarkusJx/prebuilt-boost/releases/download/1.86.0/boost-1.86.0-windows-2022-msvc-static-x86.tar.gz"
          $archive = "$boostDir\boost.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile $archive

          # Use Windows built-in tar.exe (handles symlinks correctly, unlike 7-Zip)
          tar -xzf $archive -C $boostDir
          Remove-Item $archive

      - name: Set BOOST_ROOT (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $boostRoot = "${{ github.workspace }}\QuSpin-Extensions\boost\boost"
          echo "BOOST_ROOT=$boostRoot" >> $env:GITHUB_ENV

      - name: Set BOOST_ROOT (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "BOOST_ROOT=${{ steps.install-boost-unix.outputs.BOOST_ROOT }}" >> $GITHUB_ENV

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.2
        env:
          CIBW_BUILD: ${{ matrix.python }}-*
          BOOST_ROOT: ${{ env.BOOST_ROOT }}

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ matrix.python }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install boost
        uses: MarkusJx/install-boost@v2.4.5
        id: install-boost
        with:
          boost_version: 1.86.0
          boost_install_dir: ${{ github.workspace }}/src/quspin_extensions/

      - name: Build sdist
        run: pipx run build --sdist
        env:
          BOOST_ROOT: ${{ steps.install-boost.outputs.BOOST_ROOT }}

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_all:
    needs: [build_wheels, build_sdist]
    environment: pypi
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: cibw-*
        path: dist
        merge-multiple: true

    - uses: pypa/gh-action-pypi-publish@release/v1
      with:
        verbose: true
