name: Build test

on:
  workflow_dispatch: 
 

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} for CPython ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-15]
        python: [cp311, cp312, cp313, cp314]

    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
      - name: Install boost
        uses: MarkusJx/install-boost@v2.4.5
        id: install-boost
        with:
          boost_version: 1.86.0
          boost_install_dir: ${{github.workspace}}
      # - name: List files
      #   run: ls -R ${{ steps.install-boost.outputs.BOOST_ROOT }}
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.2
        env:
          CIBW_BUILD: ${{ matrix.python }}-*
          BOOST_ROOT: ./boost/boost

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ matrix.python }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install boost
        uses: MarkusJx/install-boost@v2.4.5
        id: install-boost
        with:
          boost_version: 1.86.0
          boost_install_dir: ${{github.workspace}}/src/quspin_extensions/

      - name: Build sdist
        run: pipx run build --sdist
        env:
          BOOST_ROOT: ./src/quspin_extensions/boost/boost

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz
